<script>
Dcat.ready(function () {
    // ========== 公共函数 ==========

    // 显示错误提示
    function showError(msg) {
        $('.toast').hide();
        Dcat.error(msg);
    }

    // 密码编码
    function encodePassword(password) {
        return btoa(encodeURIComponent(password));
    }

    // 重置登录按钮状态
    function resetLoginButton() {
        $('#login-btn').removeClass('loading').prop('disabled', false);
        $('#login-btn i').removeClass('icon-loader').addClass('icon-arrow-right');
    }

    // 设置登录按钮加载状态
    function setLoginButtonLoading() {
        $('#login-btn').addClass('loading').prop('disabled', true);
        $('#login-btn i').removeClass('icon-arrow-right').addClass('icon-loader');
    }

        // ========== 滑动验证模式 ==========

    // 滑动解锁初始化
    var sliderVerified = false;
    var sliderData = [];
    var sliderThumb = $('#slider-captcha .slider-thumb');
    var sliderFill = $('#slider-captcha .slider-fill');
    var sliderTrack = $('#slider-captcha .slider-track');
    var trackWidth = sliderTrack.width() - sliderThumb.width();
    var isDragging = false;
    var startX = 0;
    var currentX = 0;

    // 鼠标/触摸开始
    sliderThumb.on('mousedown touchstart', function(e) {
        // 已验证完成后不允许再拖动
        if (sliderVerified) {
            e.preventDefault();
            return false;
        }

        e.preventDefault();
        isDragging = true;
        startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;

        // 动态重新计算 trackWidth（修复初始化为 0 的问题）
        trackWidth = sliderTrack.width() - sliderThumb.width();

        // 记录起始点
        sliderData = [{
            x: 0,
            t: Date.now()
        }];

        // 添加拖动状态
        $('#slider-captcha').removeClass('success fail');
        $('.slider-text').text('向右滑动完成验证');
    });

    // 鼠标/触摸移动
    $(document).on('mousemove touchmove', function(e) {
        if (!isDragging || sliderVerified) return;

        var clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        var deltaX = clientX - startX;
        currentX = Math.max(0, Math.min(deltaX, trackWidth));

        // 更新滑块位置
        sliderThumb[0].style.left = currentX + 'px';
        sliderFill[0].style.width = (currentX + sliderThumb.width()) + 'px';

        // 记录轨迹点
        var lastPoint = sliderData[sliderData.length - 1];
        if (Math.abs(currentX - lastPoint.x) >= 5 || sliderData.length === 1) {
            sliderData.push({
                x: currentX,
                t: Date.now()
            });
        }

        // 检查是否滑动到底
        if (currentX >= trackWidth && !sliderVerified) {
            sliderVerified = true;
            $('#slider_verified').val('1');
            $('#slider_data').val(btoa(JSON.stringify(sliderData)));

            // 成功动画
            $('#slider-captcha').addClass('success');
            $('.slider-text').text('验证成功 ✓');

            setTimeout(function() {
                Dcat.success('验证成功');
            }, 100);
        }
    });

    // 鼠标/触摸结束
    $(document).on('mouseup touchend', function() {
        if (!isDragging) return;
        isDragging = false;

        if (!sliderVerified) {
            // 未完成，回弹动画
            sliderThumb.css({
                'left': '0',
                'transition': 'left 0.3s ease'
            });
            sliderFill.css({
                'width': '0',
                'transition': 'width 0.3s ease'
            });

            // 清除transition
            setTimeout(function() {
                sliderThumb.css('transition', '');
                sliderFill.css('transition', '');
            }, 300);

            sliderData = [];
        }
    });

    // 重置滑动组件
    function resetSlider() {
        sliderVerified = false;
        sliderData = [];
        $('#slider_verified').val('0');
        $('#slider_data').val('');
        $('#slider-captcha').removeClass('success');
        $('.slider-text').text('向右滑动完成验证');
        sliderThumb.css('left', '0');
        sliderFill.css('width', '0');
    }

    // 拦截 Dcat 的 ajaxSubmit
    var originalAjaxSubmit = $.fn.ajaxSubmit;
    $.fn.ajaxSubmit = function(options) {
        var username = $('input[name="username"]').val();
        var password = $('input[name="password"]').val();

        if (!username || !password) {
            showError('请输入账号密码');
            return this;
        }
        if (!sliderVerified) {
            showError('请先完成滑动验证');
            return this;
        }

        // 密码编码
        var $passwordInput = $('input[name="password"]');
        $passwordInput.val(encodePassword(password));

        // 设置加载状态
        setLoginButtonLoading();

        var result = originalAjaxSubmit.call(this, options);

        // 提交后恢复原密码（防止再次提交时重复加密）
        var originalPassword = password;
        setTimeout(function() {
            $passwordInput.val(originalPassword);
        }, 100);

        return result;
    };

    // 初始化表单
    $('#login-form').form({ validate: true });

    // 登录失败重置滑动组件和按钮状态
    $(document).ajaxComplete(function(e, xhr, settings) {
        if (settings.url && settings.url.indexOf('/admin/auth/login') > -1) {
            if (xhr.status === 422 || xhr.status === 401 || (xhr.responseJSON && !xhr.responseJSON.status)) {
                resetSlider();
                resetLoginButton();
            }
        }
    });

    
    // ========== 创建背景粒子 ==========
    function createParticles() {
        var body = document.querySelector('.content-body');
        if (!body) return;

        for (var i = 0; i < 60; i++) {
            var particle = document.createElement('div');
            particle.className = 'particle';

            // 随机水平位置
            particle.style.left = Math.random() * 100 + '%';

            // 随机垂直起始位置
            particle.style.top = (Math.random() * 100) + '%';

            // 动画延迟（0-5秒，让粒子陆续出现）
            particle.style.animationDelay = (Math.random() * 5) + 's';

            // 随机动画时长（8-16秒）
            particle.style.animationDuration = (8 + Math.random() * 8) + 's';

            // 随机大小
            var size = (6 + Math.random() * 12);
            particle.style.width = size + 'px';

    // ========== 记住用户名功能 ==========
    // 恢复记住的用户名
    var remembered = localStorage.getItem('remembered_username');
    if (remembered) {
        $('input[name="username"]').val(remembered);
        $('#remember').prop('checked', true);
    }

    // 记住用户名
    $('#remember').on('change', function() {
        if ($(this).is(':checked')) {
            localStorage.setItem('remembered_username', $('input[name="username"]').val());
        } else {
            localStorage.removeItem('remembered_username');
        }
    });

    // 输入用户名时更新记忆
    $('input[name="username"]').on('input', function() {
        if ($('#remember').is(':checked')) {
            localStorage.setItem('remembered_username', $(this).val());
        }
    });
});
